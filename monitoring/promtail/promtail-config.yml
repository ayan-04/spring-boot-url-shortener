server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: url-shortener-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: url-shortener-logs
          app: url-shortener
          __path__: /var/log/url-shortener/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            logger: logger
            thread: thread
            message: message
            timestamp: timestamp
      - labels:
          level:
          logger:
      - timestamp:
          source: timestamp
          format: RFC3339Nano
          fallback_formats:
            - RFC3339
      - output:
          source: message
